app = "spanishcoach"
primary_region = "iad"

[build]

[env]
  DVC_DATA_DIR = "/data"

[mounts]
  source = "duo_data"
  destination = "/data"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
